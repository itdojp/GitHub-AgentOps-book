name: Build and Deploy (GitHub Actions)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    # 同一PRまたはtrusted mainの古いbuildをcancelし、stale artifactの後追いdeployを防ぐ。
    # deployしない非main manual runだけはrun_idで分離する。
    concurrency:
      group: ${{ github.workflow }}-build-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || (github.ref == 'refs/heads/main' && 'pages' || format('run-{0}', github.run_id)) }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}

    # pull_request（forkを含む）は、このread-only jobだけを実行する。
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build book
        run: |
          npm run build

      - name: Upload artifact
        # PRではartifactを作成せず、deploy jobも起動しない。
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./docs
          # v5 excludes hidden files by default; preserve the v3 template behavior.
          include-hidden-files: true

  deploy:
    # pull_request（forkを含む）は、この条件を満たさない。
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest

    # main push / main manual deployを直列化し、進行中deployはcancelしない。
    # GitHubの既定single-pending契約により、待機中は最新1件を保持する。
    concurrency:
      group: ${{ github.workflow }}-pages-deploy
      cancel-in-progress: false

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
