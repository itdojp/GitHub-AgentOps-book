title: "GitHub AgentOps 実践ガイド"
description: "Issue→Agent→PR→反復→マージの運用を、AGENTS.md / Skills / Rules / CI で標準化するための実践ガイド。例: Codex / GitHub Agents / Copilot coding agent（主要例は Codex）。"
author: "ITDO Inc."
version: "1.0.0"
lang: "ja"

# GitHub Pages設定
baseurl: "/GitHub-AgentOps-book"
url: "https://itdojp.github.io"

# Jekyll設定
markdown: kramdown
highlighter: rouge

# Kramdown設定
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Defaults: use custom book layout as default
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "book"

plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter

# Repository information for edit links
repository: "itdojp/GitHub-AgentOps-book"

permalink: pretty

exclude:
  - node_modules/
  - scripts/
  - templates/
  - src/
  - package*.json
  - README.md
  - "*.tmp"
  - Gemfile*
