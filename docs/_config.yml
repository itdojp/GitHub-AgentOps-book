title: "GitHub AgentOps 実践ガイド（Codex中心）"
description: "Issue→Agent→PR→反復→マージの運用を、AGENTS.md / Skills / Rules / CI で標準化するための実践ガイド。"
author:
  name: "ITDO Inc."
  github: "itdojp"
baseurl: "/GitHub-AgentOps-book"
url: "https://itdojp.github.io"

repository:
  github: https://github.com/itdojp/GitHub-AgentOps-book

lang: ja
theme: minima
plugins:
  - jekyll-feed

markdown: kramdown
highlighter: rouge
permalink: pretty
kramdown:
  input: GFM
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "book"

exclude:
  - node_modules/
  - scripts/
  - templates/
  - src/
  - package*.json
  - README.md
  - "*.tmp"
  - Gemfile*

