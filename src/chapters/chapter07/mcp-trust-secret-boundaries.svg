<svg xmlns="http://www.w3.org/2000/svg" width="760" height="660" viewBox="0 0 760 660" role="img" aria-labelledby="mcp-title mcp-desc">
  <title id="mcp-title">MCP tool exposureのtrust boundaryとsecret boundary</title>
  <desc id="mcp-desc">Agentには作業に必要なtoolだけを公開する。tool exposure gateでread-only、write、external side effect、secret accessを分類し、外部trust boundaryの先にあるMCP serverと外部サービスへの操作を制御する。Secret storeはsecret boundary内に隔離し、値をAgentのcontext、Issue、PR、session logへ渡さない。tool call、承認、外部操作はaudit logへ残す。</desc>
  <defs>
    <marker id="mcp-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#344054"/>
    </marker>
    <style>
      .heading { font: 700 25px 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; fill: #172033; }
      .zone-title { font: 700 17px 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; fill: #344054; }
      .card-title { font: 700 21px 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; fill: #172033; }
      .body { font: 500 16px 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; fill: #344054; }
      .small { font: 600 15px 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; fill: #344054; }
      .warning { font: 700 15px 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; fill: #9f1c14; }
      .arrow { fill: none; stroke: #344054; stroke-width: 3; marker-end: url(#mcp-arrow); }
      .audit-arrow { fill: none; stroke: #6d28d9; stroke-width: 2.5; stroke-dasharray: 8 6; marker-end: url(#mcp-arrow); }
    </style>
  </defs>

  <rect width="760" height="660" rx="20" fill="#ffffff"/>
  <text x="380" y="37" class="heading" text-anchor="middle">能力の公開と2つの境界</text>

  <rect x="24" y="65" width="492" height="295" rx="18" fill="#f8fafc" stroke="#667085" stroke-width="2"/>
  <text x="44" y="91" class="zone-title">Repository / 実行環境</text>

  <rect x="46" y="112" width="180" height="178" rx="15" fill="#eff6ff" stroke="#1d4ed8" stroke-width="3"/>
  <text x="136" y="148" class="card-title" text-anchor="middle">Agent</text>
  <text x="136" y="181" class="body" text-anchor="middle">役割とtask scope</text>
  <text x="136" y="209" class="body" text-anchor="middle">必要toolだけを利用</text>
  <rect x="67" y="235" width="138" height="34" rx="17" fill="#fef3f2" stroke="#b42318"/>
  <text x="136" y="258" class="warning" text-anchor="middle">tools: ["*"]を避ける</text>

  <rect x="278" y="96" width="216" height="216" rx="15" fill="#ecfdf5" stroke="#047857" stroke-width="3"/>
  <text x="386" y="132" class="card-title" text-anchor="middle">tool exposure gate</text>
  <rect x="300" y="151" width="172" height="32" rx="8" fill="#ffffff" stroke="#047857"/>
  <text x="386" y="173" class="small" text-anchor="middle">read-only：allow</text>
  <rect x="300" y="192" width="172" height="42" rx="8" fill="#ffffff" stroke="#b45309"/>
  <text x="386" y="210" class="small" text-anchor="middle">write / external：</text>
  <text x="386" y="228" class="small" text-anchor="middle">prompt・owner承認</text>
  <rect x="300" y="243" width="172" height="42" rx="8" fill="#ffffff" stroke="#b42318"/>
  <text x="386" y="261" class="small" text-anchor="middle">secret access：</text>
  <text x="386" y="279" class="small" text-anchor="middle">forbiddenを既定</text>

  <path d="M226 200 H268" class="arrow"/>
  <text x="247" y="187" class="small" text-anchor="middle">tool call</text>

  <line x1="530" y1="64" x2="530" y2="395" stroke="#b45309" stroke-width="4" stroke-dasharray="11 8"/>
  <rect x="540" y="68" width="196" height="292" rx="18" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="638" y="94" class="zone-title" text-anchor="middle">外部 trust boundary</text>
  <rect x="562" y="116" width="152" height="88" rx="14" fill="#ffffff" stroke="#b45309" stroke-width="3"/>
  <text x="638" y="151" class="card-title" text-anchor="middle">MCP server</text>
  <text x="638" y="178" class="body" text-anchor="middle">identity / scope</text>
  <rect x="562" y="244" width="152" height="82" rx="14" fill="#ffffff" stroke="#b45309" stroke-width="3"/>
  <text x="638" y="273" class="card-title" text-anchor="middle">外部service</text>
  <text x="638" y="299" class="body" text-anchor="middle">read / write</text>
  <text x="638" y="320" class="body" text-anchor="middle">side effect</text>
  <path d="M494 160 H552" class="arrow"/>
  <path d="M638 204 V234" class="arrow"/>

  <rect x="230" y="395" width="300" height="100" rx="15" fill="#f5f3ff" stroke="#6d28d9" stroke-width="3"/>
  <text x="380" y="431" class="card-title" text-anchor="middle">Audit log</text>
  <text x="380" y="461" class="body" text-anchor="middle">tool call・外部操作・承認者・失敗</text>
  <path d="M386 312 V385" class="audit-arrow"/>
  <path d="M638 326 C638 445 560 445 540 445" class="audit-arrow"/>

  <rect x="24" y="520" width="712" height="112" rx="18" fill="#fef3f2" stroke="#b42318" stroke-width="4" stroke-dasharray="11 8"/>
  <text x="44" y="548" class="warning">secret boundary</text>
  <rect x="476" y="543" width="232" height="65" rx="13" fill="#ffffff" stroke="#b42318" stroke-width="2"/>
  <text x="592" y="570" class="card-title" text-anchor="middle">Secret store</text>
  <text x="592" y="594" class="body" text-anchor="middle">scoped credential / 承認条件</text>
  <rect x="48" y="558" width="372" height="50" rx="12" fill="#ffffff" stroke="#b42318"/>
  <text x="234" y="579" class="warning" text-anchor="middle">secret値をAgent context・Issue・PR・</text>
  <text x="234" y="599" class="warning" text-anchor="middle">session logへ渡さない</text>
  <path d="M592 543 C592 480 500 430 470 312" class="arrow"/>
  <rect x="475" y="491" width="250" height="27" rx="8" fill="#ffffff"/>
  <text x="600" y="510" class="small" text-anchor="middle">scoped credential・例外承認</text>
</svg>
